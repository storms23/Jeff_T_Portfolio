<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090B"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle diagonal accents -->
  <path d="M-100 520 L520 -100" stroke="url(#accent)" stroke-width="10" opacity="0.18"/>
  <path d="M180 720 L800 -100" stroke="url(#accent)" stroke-width="8" opacity="0.12"/>
  <path d="M520 720 L1140 -100" stroke="url(#accent)" stroke-width="6" opacity="0.10"/>

  <!-- soft glow blobs -->
  <circle cx="220" cy="170" r="140" fill="#FFFFFF" opacity="0.14" filter="url(#soft)"/>
  <circle cx="980" cy="470" r="160" fill="#A1A1AA" opacity="0.12" filter="url(#soft)"/>

  <!-- frame -->
  <rect x="56" y="56" width="1088" height="518" rx="28" stroke="white" opacity="0.08"/>

  <!-- label -->
  <g>
    <text x="600" y="305" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="18" fill="white" opacity="0.60" letter-spacing="6">PROJECT</text>
    <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="white" opacity="0.92">Placeholder Image</text>
    <text x="600" y="392" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="white" opacity="0.55">Replace with your project screenshot later</text>
  </g>
</svg>
